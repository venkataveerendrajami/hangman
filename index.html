<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hangman | Guess the Word</title>

  <!-- Google Fonts: a hand-written chalk style for the title,
       and a monospace "typewriter" style for the word and letters -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>

  <div class="board">

    <!-- ===== Header ===== -->
    <header class="board__header">
      <p class="eyebrow">Word Guessing Game</p>
      <h1 class="title">Hangman<span class="title__dot">.</span></h1>
      <p class="subtitle">Guess the hidden word, one letter at a time.</p>
    </header>

    <!-- ===== Main game area ===== -->
    <main class="game">

      <!-- Left side: the hangman drawing -->
      <section class="gallows-panel" aria-label="Hangman drawing">
        <svg id="hangman-svg" class="gallows" viewBox="0 0 220 240" xmlns="http://www.w3.org/2000/svg">
          <!-- Base + post + beam + rope: always visible -->
          <line x1="20" y1="220" x2="140" y2="220" class="chalk-line base" />
          <line x1="55" y1="220" x2="55" y2="20" class="chalk-line post" />
          <line x1="53" y1="20" x2="150" y2="20" class="chalk-line beam" />
          <line x1="148" y1="20" x2="148" y2="45" class="chalk-line rope" />

          <!-- Body parts revealed one at a time as wrong guesses happen -->
          <circle cx="148" cy="62" r="17" class="chalk-line part" data-part="1" />
          <line x1="148" y1="79" x2="148" y2="135" class="chalk-line part" data-part="2" />
          <line x1="148" y1="95" x2="122" y2="115" class="chalk-line part" data-part="3" />
          <line x1="148" y1="95" x2="174" y2="115" class="chalk-line part" data-part="4" />
          <line x1="148" y1="135" x2="126" y2="170" class="chalk-line part" data-part="5" />
          <line x1="148" y1="135" x2="170" y2="170" class="chalk-line part" data-part="6" />
        </svg>

        <p class="attempts" aria-live="polite">
          Attempts left: <span id="attempts-left">6</span> / <span id="attempts-max">6</span>
        </p>
      </section>

      <!-- Right side: word display, guesses, controls -->
      <section class="play-panel">

        <p id="message" class="message" aria-live="polite">Pick a letter to begin!</p>

        <div class="word-display" id="word-display" aria-label="Current word progress">
          <!-- Letter slots are injected here by JavaScript -->
        </div>

        <form id="guess-form" class="guess-form" autocomplete="off">
          <label for="letter-input" class="visually-hidden">Guess a letter</label>
          <input
            type="text"
            id="letter-input"
            name="letter"
            maxlength="1"
            placeholder="A"
            pattern="[A-Za-z]"
            inputmode="text"
            aria-label="Type a single letter"
          />
          <button type="submit" id="submit-guess">Submit Guess</button>
        </form>

        <div class="keyboard" id="keyboard" aria-label="On-screen letter buttons">
          <!-- A-Z buttons are injected here by JavaScript -->
        </div>

        <div class="guessed-panel">
          <h2>Guessed letters</h2>
          <p id="guessed-letters" class="guessed-list">None yet</p>
        </div>

        <button type="button" id="restart-btn" class="restart-btn">Restart Game</button>

      </section>
    </main>
  </div>

  <!-- Win / Lose overlay -->
  <div id="result-overlay" class="overlay hidden">
    <div class="overlay__card">
      <h2 id="result-title">You win!</h2>
      <p id="result-text">The word was <strong id="result-word">apple</strong></p>
      <button type="button" id="overlay-restart-btn">Play Again</button>
    </div>
  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
